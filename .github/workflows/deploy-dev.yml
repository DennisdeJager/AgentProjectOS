name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: [self-hosted]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate source models
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Prepare bundle
        run: |
          rm -rf .deploy
          mkdir -p .deploy/agent-project-os
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.deploy' \
            --exclude 'node_modules' \
            ./ .deploy/agent-project-os/

      - name: Deploy to Dev
        env:
          DEPLOY_HOST: 192.168.10.12
          DEPLOY_USER: root
          DEPLOY_APP_DIR: /data/dev/apps/agent-project-os
          DEPLOY_SERVICE: agent-project-os-dev
          DEPLOY_PORT: 4173
        run: bash scripts/deploy-dev.sh .deploy/agent-project-os

